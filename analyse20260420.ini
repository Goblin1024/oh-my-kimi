  三、为什么存在这个根本性的 Gap？

  核心矛盾：OMK 的架构是"触发器 + 状态跟踪"，不是"工作流引擎"。

  当前数据流：
  用户输入 $ralph → Hook 拦截（代码约束入口）→ 写入 state: {phase: "starting"}
  → Kimi 读取 SKILL.md（纯文本指导）→ Kimi 自由执行（完全自治）
  → Kimi 可能调用 omk_write_state MCP tool（可选，代码只验证 phase 名称合法性）

  关键瓶颈：

  1. LLM 执行是黑盒：Kimi CLI 的 Agent 执行循环完全在 LLM 内部。OMK 无法像 Kubernetes 调度 Pod 那样"强制" LLM 执行第 3 步。
  2. MCP 是邀请制，不是强制制：omk_write_state 工具存在，但 LLM 可以选择不调用它。SKILL.md 写了"Update state to phase X"，但 LLM 完全可以在不调用 tool 的情况
     自行认为已处于该阶段。
  3. 产出物无校验：SKILL.md 要求"Save PRD to .omk/plans/"，但代码层从不检查该文件是否真的存在、格式是否正确。
  4. 验证步骤无法强制：SKILL.md 要求"npm test → All pass"，但代码层没有 omk_verify_tests 这样的强制检查点。LLM 可以说"测试通过了"而不实际运行。

