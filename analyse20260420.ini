  ───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  五、如果要做到完全代码约束，需要什么级别的架构变革？

  这不是简单的修修补补，而是需要工作流引擎化重构：

  方案 A：MCP 工具链强制化（渐进式）

  将 SKILL.md 中的每个关键步骤转化为 MCP tool，LLM 必须通过 tool call 完成步骤，代码层验证后才解锁下一步：

  // 新增 MCP tools
  omk_step_complete({ step: 'context_review', evidence: '...' })  // 代码层检查 .omk/context/ 是否存在
  omk_step_complete({ step: 'prd_written', evidence: '...' })     // 代码层检查 .omk/plans/prd-*.md 是否存在
  omk_step_complete({ step: 'tests_pass', evidence: 'npm test output' }) // 代码层解析输出确认 exit 0
  omk_step_complete({ step: 'build_pass', evidence: '...' })
  omk_step_complete({ step: 'architect_approved', evidence: '...' })

  然后在 workflow-transition.ts 中：

  // 阶段转换不仅需要合法的 phase 名称，还需要检查前置步骤的证据
  function assertStepPrerequisites(skill: string, toPhase: string, evidenceDir: string) {
    if (toPhase === 'approved' && !hasPrdDocument(evidenceDir)) {
      throw new Error('Cannot transition to approved: PRD document missing');
    }
    if (toPhase === 'completed' && !hasFreshTestResults(evidenceDir)) {
      throw new Error('Cannot transition to completed: test evidence missing');
    }
  }

  方案 B：Hook 拦截 + 分步激活（激进式）

  不再一次性激活整个 Skill，而是将工作流拆分为多个 Hook 触发点：

  $ralplan → 激活 Phase 1 (Context Review)
  用户/LLM 完成后 → $ralplan:step2 → 激活 Phase 2 (Architecture)
  ...

  每个步骤转换都经过 Hook，Hook 执行代码层校验。

  方案 C：产出物审计系统（推荐）

  不干预 LLM 的执行过程，但在关键检查点强制验证产出物：

  .omk/
  ├── state/
  ├── plans/
  ├── evidence/          # 新增：每一步的证据目录
  │   ├── ralph/
  │   │   ├── 01-context-loaded.json    # LLM 必须写入
  │   │   ├── 02-tests-passed.json      # 包含 npm test 输出
  │   │   ├── 03-build-passed.json
  │   │   └── 04-architect-approved.json
  │   └── ralplan/
  │       ├── 01-context-reviewed.json
  │       ├── 02-prd-written.json       # 指向 prd-*.md
  │       └── 03-user-approved.json

  omk_write_state 在写入 phase: "completed" 时，自动检查 evidence/ralph/ 目录下是否包含所有必需文件。

  ───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  六、我的建议

  当前 30% 的代码约束率已经远超原始 OMK（原始版本约 5%，只有关键词检测）。但如果目标是"行业顶尖水平的工作流引擎"，需要选择上述方案之一。

  最务实的下一步（不破坏现有架构的前提下最大化代码约束率）：

  1. 产出物审计：在 omk_write_state 中增加 per-phase 前置检查（如 completed 阶段要求 .omk/evidence/ 中存在测试/构建证据）
  2. 强制证据收集：新增 omk_submit_evidence(step, artifactPath) MCP tool，LLM 必须调用它来"证明"完成了某步骤
  3. Flag 语义代码化：在 omk_write_state 中检查 --deliberate 模式是否提交了多轮 review 证据

  这可以将代码约束率从 30% 提升到 60-70%，且保持与现有 Kimi CLI 架构兼容。

