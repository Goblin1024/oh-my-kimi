  根本问题：架构设计

  OMK 的当前架构是：

  用户输入 $skill → Hook 拦截（代码约束：flag/gate/关键词）→ 写入 state（phase: starting）
  → LLM 读取 SKILL.md → LLM 自由执行工作流 → LLM 可能通过 MCP 更新状态

  这是一个入口管控 + 状态跟踪架构，不是工作流引擎架构。

  真正的"代码层强制执行"需要：

  1. 步骤编排引擎：将 SKILL.md 中的步骤转化为有向图，LLM 每完成一步必须通过 tool call 汇报，代码层才允许进入下一步
  2. 持续校验：每个步骤完成后，代码层验证产出物是否符合要求（如 PRD 是否存在、测试是否通过）
  3. 产出物校验：代码层检查 .omk/plans/prd-*.md 是否存在，而不是依赖 LLM 自觉写入
  4. 强制工具调用：LLM 必须通过 omk_write_state 推进阶段，而不是在对话中自行决定已完成

  但是，有一个现实约束：Kimi CLI 的架构决定了 LLM 是自由执行的 Agent。OMK 只能通过：

  • Hooks（事件拦截）
  • MCP Tools（LLM 主动调用）
  • SKILL.md 注入（上下文指导）

  来影响 LLM 行为。我们无法强制 LLM 执行特定步骤，除非将工作流拆分为多个独立的 Hook/MCP 交互，或者使用更严格的工具协议。

  诚实的评估：

  当前实现的"代码约束"只覆盖了：

  • 激活门槛（约 10% 的规则）
  • 状态转换验证（约 5% 的规则，且只验证 phase 名称合法性，不验证步骤内容）
  • 其余 85% 的工作流规则仍然是文档约定

  但这并不意味之前的重构没有价值。激活门槛的代码化已经是一个重大进步——它阻止了用户带着错误参数启动工作流。只是距离"完全代码约束"还有很大距离。

