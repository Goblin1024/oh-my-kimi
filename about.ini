• 基于对项目源代码、配置文件和文档的分析，oh-my-kimi (OMK) 是一个为 Kimi Code CLI 设计的工作流编排层（Workflow Orchestration Layer）。它的核
  心目标是为 Kimi CLI 补充结构化工作流、智能状态管理和可复用的 Agent 技能。

  以下是该项目实现的详细功能分析：

  ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  1. Kimi CLI Hook 集成与命令拦截

  OMK 通过 Kimi CLI 的原生 Hook 系统（UserPromptSubmit、SessionStart、Stop）深度集成：

  • 命令拦截：当用户输入 $deep-interview、$ralph、$cancel 等以 $ 开头的指令时，Hook 处理器会捕获并识别。
  • 动态上下文注入：在 SessionStart 时，如果检测到存在活跃的工作流，会自动将对应的 Agent 角色 Prompt（如 architect、executor 等）注入到当前 
    话上下文中，实现无感恢复。
  • 防误退出：在 Stop 事件中，如果工作流仍在活跃状态，会阻止退出并提示用户先完成或使用 $cancel。

  ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  2. Skill 系统（结构化工作流）

  OMK 内置了一套基于 SKILL.md 的可扩展技能系统，用户通过简单指令即可触发复杂的多步骤工作流：

   指令                                                           功能描述
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━   
   $deep-interview                                                苏格拉底式需求澄清，通过结构化提问明确目标、范围和约束
   $ralplan                                                       架构规划与审批，在编码前生成并确认实现方案
   $ralph                                                         持久化执行循环，直到任务完成并通过验证（强制要求测试通过、构建成功等）    
   $team                                                          启动多 Agent 并行执行
   $cancel                                                        优雅终止当前活跃工作流
   $plan / $analyze / $build-fix / $code-review / $note / $help   其他辅助工作流

  技能检测由可扩展的关键词注册表（KeywordRegistry）管理，支持正则匹配和基于优先级的冲突解决。

  ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  3. 项目状态持久化管理

  OMK 在项目的 .omk/state/ 目录中维护工作流状态，实现跨会话的连续性：

  • 活跃状态追踪：记录当前激活的 skill、phase（阶段）、激活时间、迭代次数等。
  • 状态转换验证：工作流阶段变更时会进行合法性校验（如 executing → verifying 合法，但不可随意回退）。
  • 断点续作：即使 Kimi CLI 会话中断，下次启动时也能读取状态并恢复之前的工作流上下文。

  ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  4. Agent 角色与 Prompt 映射系统

  OMK 将不同的 skill 映射到不同的 Agent 角色（prompts/ 目录下）：

  • architect（架构师）—— 用于 $ralplan、$team
  • executor（执行者）—— 用于 $ralph
  • planner（规划者）—— 用于 $deep-interview、$plan
  • debugger（调试者）—— 用于 $build-fix
  • code-reviewer、qa-tester、security-reviewer、explorer、verifier、writer 等

  这种映射确保 Kimi 在执行不同工作流时，能动态加载对应的行为准则和专业角色设定。

  ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  5. 多 Agent 并行执行（Team Runtime）

  src/team/runtime.ts 实现了一个团队运行时，支持启动多个子进程并行处理子任务：

  • 命令格式：omk team 3:executor "重构代码库"（启动 3 个执行者角色的 worker）
  • 支持状态监控（omk team status）和强制关闭（omk team shutdown）
  • 每个 worker 有独立的 PID、状态和任务分配

  ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  6. MCP（Model Context Protocol）服务器

  OMK 实现了两个 MCP Server，允许通过标准协议与外部工具集成：

  • omk mcp state：暴露 omk_read_state、omk_write_state、omk_list_skills 三个工具，供外部读取和修改 OMK 工作流状态。
  • omk mcp memory：暴露 omk_memory_store、omk_memory_query、omk_memory_list 三个工具，实现跨会话的项目级记忆存储、标签分类和检索。

  ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  7. HUD 实时仪表板

  omk hud 启动一个终端内的实时 Heads-Up Display：

  • 每 2 秒刷新一次，显示当前工作流是否活跃、当前 Skill、阶段、已运行时长等信息。
  • 需要交互式终端（TTY）运行。

  ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  8. CLI 工具集

   命令                     功能
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   omk setup                一键安装：复制 skills 到 ~/.kimi/skills/omk、复制 prompts、配置 ~/.kimi/config.toml 的 hooks
   omk doctor               诊断 OMK 是否正确安装和配置
   omk explore <query>      代码库搜索工具
   omk hud                  启动实时状态面板
   omk hud                  启动实时状态面板
   omk team ...             团队并行任务管理
   omk mcp <state|memory>   启动 MCP 服务器

  ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  9. 项目级记忆系统（Project Memory）

  除了工作流状态外，OMK 还支持在 .omk/context/ 和 project-memory.json 中存储：

  • 需求访谈的上下文快照（Context Snapshot）
  • 带标签的跨会话记忆条目
  • 已批准的架构计划（plans）

  ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
  总结

  oh-my-kimi 本质上是一个为 Kimi Code CLI 打造的"操作系统扩展层"。它并没有替换 Kimi 的执行能力，而是通过 Hook 拦截 + 状态机 + Skill 编排 + A                                                                                                          
  gent 角色注入，将零散的 AI 对话转化为可追踪、可恢复、可复用的结构化开发流程。这对于需要长时间迭代、多步骤验证的复杂编程任务尤为重要。• 基于对项目源代码、配置文件和文档的分析，oh-my-kimi (OMK) 是一个为 Kimi Code CLI 设计的工作流编排层（Workflow Orchestration Layer）。它的核
